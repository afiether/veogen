version: "3.9"

services:
  gentle:
    image: lowerquality/gentle
    container_name: gentle
    restart: unless-stopped
    ports:
      - "8765:8765"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

  f5tts:
    image: ghcr.io/swivid/f5-tts:main
    #build:
    #  context: ./f5tts
    #  dockerfile: Dockerfile
    container_name: f5tts
    restart: unless-stopped
    ports:
      - "7860:7860"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
              count: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    #command: f5-tts_infer-gradio --server_name 0.0.0.0 --server_port 7860
    command: f5-tts_infer-gradio  --host 0.0.0.0 --port 7860
    #command: >
    #  python3 app.py --host 0.0.0.0 --port 7860
